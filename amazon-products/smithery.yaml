startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      AMAZON_REGION:
        type: string
        title: Default Region
        description: Default Amazon region (e.g. us, uk, de). Can be overridden per request.
  commandFunction:
    |-
    (config) => ({
      command: '/app/amazon-products-mcp',
      env: {
        ...(config.AMAZON_REGION ? { AMAZON_REGION: config.AMAZON_REGION } : {})
      }
    })
build:
  dockerfile: Dockerfile
  dockerBuildPath: "."
