startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - MANIFOLD_API_KEY
    properties:
      MANIFOLD_API_KEY:
        type: string
        title: API Key
        description: Manifold Markets API key from your account settings
      MANIFOLD_API_URL:
        type: string
        title: API URL
        description: Custom API URL (default https://api.manifold.markets)
  commandFunction:
    |-
    (config) => ({
      command: '/app/manifold-mcp',
      env: {
        MANIFOLD_API_KEY: config.MANIFOLD_API_KEY,
        ...(config.MANIFOLD_API_URL ? { MANIFOLD_API_URL: config.MANIFOLD_API_URL } : {})
      }
    })
build:
  dockerfile: Dockerfile
  dockerBuildPath: "."
